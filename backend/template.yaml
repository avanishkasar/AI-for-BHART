AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: >
  CodeRescue AI — Backend Infrastructure
  AWS Lambda + API Gateway + DynamoDB + Amazon Bedrock
  AI for Bharat Hackathon 2026

Globals:
  Function:
    Timeout: 30
    MemorySize: 256
    Runtime: python3.12
    Environment:
      Variables:
        TABLE_NAME: !Ref IncidentsTable
        MODEL_ID: anthropic.claude-3-haiku-20240307-v1:0
        AWS_REGION_NAME: !Ref AWS::Region

Resources:

  # ── API Gateway ──
  CodeRescueApi:
    Type: AWS::Serverless::Api
    Properties:
      Name: CodeRescueAI-API
      StageName: prod
      Cors:
        AllowMethods: "'POST,OPTIONS'"
        AllowHeaders: "'Content-Type,Authorization'"
        AllowOrigin: "'*'"
      Description: REST API for CodeRescue AI features

  # ── Lambda Function ──
  CodeRescueFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: CodeRescueAI-Handler
      CodeUri: .
      Handler: lambda_function.lambda_handler
      Description: Processes all CodeRescue AI feature requests via Amazon Bedrock
      Policies:
        # Bedrock access
        - Version: "2012-10-17"
          Statement:
            - Effect: Allow
              Action:
                - bedrock:InvokeModel
                - bedrock:InvokeModelWithResponseStream
              Resource:
                - !Sub "arn:aws:bedrock:${AWS::Region}::foundation-model/anthropic.claude-3-haiku-20240307-v1:0"
                - !Sub "arn:aws:bedrock:${AWS::Region}::foundation-model/anthropic.claude-3-sonnet-20240229-v1:0"
        # DynamoDB access
        - DynamoDBCrudPolicy:
            TableName: !Ref IncidentsTable
      Events:
        ApiPost:
          Type: Api
          Properties:
            RestApiId: !Ref CodeRescueApi
            Path: /api/rescue
            Method: POST
        ApiOptions:
          Type: Api
          Properties:
            RestApiId: !Ref CodeRescueApi
            Path: /api/rescue
            Method: OPTIONS

  # ── DynamoDB Table ──
  IncidentsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: CodeRescueIncidents
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      Tags:
        - Key: Project
          Value: CodeRescueAI
        - Key: Hackathon
          Value: AIForBharat2026

Outputs:
  ApiEndpoint:
    Description: API Gateway endpoint URL for CodeRescue AI
    Value: !Sub "https://${CodeRescueApi}.execute-api.${AWS::Region}.amazonaws.com/prod/api/rescue"
  FunctionArn:
    Description: Lambda Function ARN
    Value: !GetAtt CodeRescueFunction.Arn
  DynamoDBTable:
    Description: DynamoDB table name
    Value: !Ref IncidentsTable
